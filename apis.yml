platforms:
  - name: SEI Wealth Platform
    description: >-
      Modern, fully integrated wealth management technology and outsourced
      operations solution used by banks, trust companies, and wealth managers.
      Selected by clients including Huntington National Bank (March 2026).
    audience: Banks and Wealth Managers
  - name: SEI Data Cloud
    description: >-
      Fully managed data platform providing seamless access to near real-time
      data for banks and wealth managers.
    audience: Banks and Wealth Managers
  - name: SEI Sphere
    description: >-
      Managed IT services platform delivering cybersecurity, cloud
      infrastructure, and network operations to financial services clients.
    audience: All segments
  - name: SEI Novus
    description: >-
      Institutional portfolio analytics and reporting platform offering total
      portfolio visibility and flexible reporting for OCIO clients, pensions,
      endowments, and foundations.
    audience: Institutional Investors
  - name: SEI Access for CITs
    description: >-
      Digital onboarding solution for Collective Investment Trusts launched in
      April 2026 to modernize the CIT onboarding experience across the
      retirement ecosystem.
    audience: Asset Managers / Retirement
  - name: Investment Manager Technologies
    description: >-
      Proprietary, integrated technology solutions for asset managers
      covering fund accounting, administration, distribution, and operations.
    audience: Asset Managers
  - name: SEI Private Trust Company
    description: >-
      Federally chartered limited purpose savings association and wholly
      owned SEI subsidiary providing integrated custody for RIAs and hybrid
      advisors.
    audience: Financial Advisors
  - name: SEI Investments Management Corporation
    description: >-
      Federally registered investment advisor and wholly owned SEI subsidiary
      delivering curated investment strategies and OCIO services.
    audience: All segments
