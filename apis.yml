description: >-
  SEI Investments Company (NASDAQ: SEIC) is a publicly traded financial
  services and technology provider founded in 1968 and headquartered in Oaks,
  Pennsylvania. SEI delivers end-to-end technology, operations, and asset
  management solutions to asset managers, banks and wealth managers, financial
  advisors, and institutional investors. Marquee platforms include the SEI
  Wealth Platform (front-to-back wealth management technology and outsourced
  operations), SEI Data Cloud (managed near-real-time data platform), SEI
  Sphere (managed IT, cybersecurity, cloud, and network operations), and SEI
  Novus (institutional portfolio analytics). SEI does not run a public
  developer portal — partner and client integrations are delivered through
  contractual onboarding to the SEI Wealth Platform, SEI Connect advisor
  channels, and managed-service engagements rather than self-serve OpenAPI or
  SDK distribution.
created: '2026-05-23'
modified: '2026-05-23'
specificationVersion: '0.19'
apis: []
x-no-public-api: true
x-no-public-api-reason: >-
  SEI Investments does not publish a public developer portal, OpenAPI
  specifications, SDKs, sandbox environments, or self-serve API keys. The SEI
  Wealth Platform, SEI Data Cloud, SEI Sphere, SEI Novus, and SEI Access for
  CITs are delivered to institutional clients (banks, RIAs, asset managers,
  pension plans) under contract, with integrations arranged through SEI
  onboarding, professional services, and partner programs. There is no
  developer.seic.com, api.seic.com, or public GitHub organization for SEI as
  of this profiling. The "SEI Connect" naming sometimes referenced in advisor
  partner contexts is not a public API product with documentation or
  specifications available outside contractual relationships.
